name: build

on:
  push:
  pull_request:

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt update
          sudo apt install -y gcc libassimp-dev libglew-dev libsdl2-dev libsdl2-image-dev
          gcc main.c -o demo-linux-x86_64 -lm -lassimp -lGL -lGLEW -lSDL2 -lSDL2_image
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: demo-linux-x86_64

  linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$PWD:/src" \
            -w /src \
            arm64v8/ubuntu:22.04 \
            bash -c "
              apt update &&
              apt install -y gcc libassimp-dev libglew-dev libsdl2-dev libsdl2-image-dev &&
              gcc main.c -o demo-linux-arm64 -lm -lassimp -lGL -lGLEW -lSDL2 -lSDL2_image
            "
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: demo-linux-arm64

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install vcpkg deps (static)
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install assimp sdl2 sdl2-image glew --triplet x64-windows-static
      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /O2 /MT main.c ^
            /I vcpkg\installed\x64-windows-static\include ^
            /link ^
            /LIBPATH:vcpkg\installed\x64-windows-static\lib ^
            assimp.lib SDL2.lib SDL2main.lib SDL2_image.lib glew32s.lib ^
            opengl32.lib user32.lib gdi32.lib winmm.lib ^
            /OUT:demo-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: demo-windows.exe